<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mühür — Admin Panel</title>
<link rel="stylesheet" href="admin.css" />
</head>
<body>

  <section id="screen-login" class="screen screen--center">
    <h1 class="brand">MÜHÜR <span class="brand__sub">ADMIN</span></h1>
    <form id="login-form" class="form">
      <label class="field">
        <span class="field__label">İstifadəçi adı</span>
        <input id="login-username" type="text" autocomplete="username" required />
      </label>
      <label class="field">
        <span class="field__label">Parol</span>
        <input id="login-password" type="password" autocomplete="current-password" required />
      </label>
      <button type="submit" class="btn btn--primary">Daxil ol</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </section>

  <section id="screen-dashboard" class="screen hidden">
    <header class="topbar">
      <span class="brand brand--sm">MÜHÜR ADMIN</span>
      <button id="logout-btn" class="btn btn--ghost btn--sm">Çıxış</button>
    </header>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-card__value" id="stat-users">—</div><div class="stat-card__label">İstifadəçi</div></div>
      <div class="stat-card"><div class="stat-card__value" id="stat-messages">—</div><div class="stat-card__label">Mesaj (1-1)</div></div>
      <div class="stat-card"><div class="stat-card__value" id="stat-groups">—</div><div class="stat-card__label">Qrup</div></div>
      <div class="stat-card"><div class="stat-card__value" id="stat-active">—</div><div class="stat-card__label">Aktiv (24s)</div></div>
    </div>

    <p class="note">⚠️ Mesaj məzmunu uçdan-uca şifrəlidir — admin heç vaxt heç kimin yazışmasını görə bilməz. Yalnız metadata (ad, tarix, ban statusu) görünür.</p>

    <div class="toolbar">
      <input id="search-input" type="text" placeholder="İstifadəçi axtar…" />
      <button id="search-btn" class="btn btn--gold-outline btn--sm">Axtar</button>
    </div>

    <table class="user-table">
      <thead>
        <tr><th>ID</th><th>Ad</th><th>Açar v.</th><th>Son aktiv</th><th>Status</th><th></th></tr>
      </thead>
      <tbody id="user-table-body"></tbody>
    </table>
    <div class="pager">
      <button id="prev-page" class="btn btn--ghost btn--sm">‹ Əvvəlki</button>
      <span id="page-label">1</span>
      <button id="next-page" class="btn btn--ghost btn--sm">Sonrakı ›</button>
    </div>
  </section>

  <script src="admin.js"></script>
</body>
</html>
